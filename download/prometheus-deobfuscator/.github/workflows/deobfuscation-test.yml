name: Deobfuscation Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'tests/samples/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-samples:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Create test samples
      run: |
        mkdir -p test-samples

        # Sample 1: String table obfuscation
        cat > test-samples/string_table.lua << 'EOF'
        local strings = {"print", "Hello", "World"}
        local func = _G[strings[1]]
        func(strings[2] .. " " .. strings[3])
        EOF

        # Sample 2: Variable renaming
        cat > test-samples/variable_rename.lua << 'EOF'
        local IlI1lI = 10
        local lI1IlI = 20
        local I1lIlI = IlI1lI + lI1IlI
        print(I1lIlI)
        EOF

        # Sample 3: Constant folding
        cat > test-samples/constant_folding.lua << 'EOF'
        local x = (10 + 20) * 2
        local y = 100 / 4 - 5
        local z = string.len("hello") + 5
        print(x, y, z)
        EOF

        # Sample 4: Control flow
        cat > test-samples/control_flow.lua << 'EOF'
        local x = 0
        while true do
            x = x + 1
            if x > 5 then
                break
            end
        end
        print(x)
        EOF

        # Sample 5: Combined obfuscation
        cat > test-samples/combined.lua << 'EOF'
        local IllIII = {"func", "value", 42}
        local llllll = function(IIIIII)
            local IIIIII = IIIIII + 1
            return IIIIII
        end
        local result = llllll(IllIII[3])
        print(result)
        EOF

        # Sample 6: Prometheus Weak style
        cat > test-samples/prometheus_weak.lua << 'EOF'
        local IlI1lIlI1lI = {[1]="print",[2]="Hello World!",[3]=42}
        local lI1IlI1IlI1 = _G[IlI1lIlI1lI[1]]
        local function I1lIlI1lIlI(IllIllIllI)
            local lIIlIIlIIlI = 0
            while true do
                lIIlIIlIIlI = lIIlIIlIIlI + 1
                if lIIlIIlIIlI > IllIllIllI then
                    break
                end
            end
            return lIIlIIlIIlI
        end
        lI1IlI1IlI1(IlI1lIlI1lI[2])
        local result = I1lIlI1lIlI(10)
        lI1IlI1IlI1(tostring(result))
        EOF

    - name: Run deobfuscation tests
      run: |
        echo "Running deobfuscation on test samples..."

        for file in test-samples/*.lua; do
          echo ""
          echo "=========================================="
          echo "Processing: $file"
          echo "=========================================="

          node dist/cli.js "$file" -v --report

          # Check if deobfuscated file was created
          if [ -f "${file%.lua}_deobfuscated.lua" ]; then
            echo "✓ Deobfuscation successful"
            echo "--- Output ---"
            cat "${file%.lua}_deobfuscated.lua"
          else
            echo "✗ Deobfuscation failed"
            exit 1
          fi
        done

    - name: Verify output functionality
      run: |
        echo "Installing Lua for verification..."
        sudo apt-get update
        sudo apt-get install -y lua5.1

        echo ""
        echo "Testing deobfuscated files..."

        for file in test-samples/*_deobfuscated.lua; do
          echo "Testing: $file"
          if lua5.1 -c "$file" 2>/dev/null; then
            echo "✓ Syntax check passed"
          else
            echo "✗ Syntax check failed"
            lua5.1 "$file" 2>&1 || true
          fi
        done

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: deobfuscation-results
        path: |
          test-samples/*_deobfuscated.lua
          test-samples/*.report.json
        retention-days: 7
