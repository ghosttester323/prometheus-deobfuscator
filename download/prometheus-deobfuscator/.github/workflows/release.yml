name: Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Run tests
      run: npm test

    - name: Publish to npm
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create distribution archive
      run: |
        tar -czvf prometheus-deobfuscator-${{ github.event.release.tag_name }}.tar.gz \
          dist/ README.md LICENSE package.json

    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./prometheus-deobfuscator-${{ github.event.release.tag_name }}.tar.gz
        asset_name: prometheus-deobfuscator-${{ github.event.release.tag_name }}.tar.gz
        asset_content_type: application/gzip
